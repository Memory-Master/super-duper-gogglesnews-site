<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבצר פלטינום VIP 💎 - שליטה מוחלטת</title>
    <style>
        :root { --p: #075e54; --s: #25d366; --bg: #0b141a; --card: #202c33; --txt: #e9edef; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        
        /* 📻 פיצ'ר רדיו VIP */
        .radio-zone { background: #111b21; padding: 12px; border-bottom: 3px solid var(--s); display: flex; align-items: center; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 2000; }
        .radio-title { font-size: 0.9rem; font-weight: bold; color: var(--s); }

        header { background: var(--p); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px #000; }
        .logo { font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: gray; border: 2px solid #fff; box-shadow: 0 0 8px #fff; }

        /* ⚙️ פאנל בקרת חסימות (הבטחת הפיצוי) */
        .debug-box { background: rgba(255,255,255,0.05); margin: 10px; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.75rem; border: 1px dashed #555; text-align: center; }

        .container { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin: 10px; width: 92%; max-width: 550px; border-right: 6px solid var(--s); animation: slideIn 0.5s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } }
        
        .title { font-weight: bold; font-size: 1.3rem; color: #fff; text-decoration: none; display: block; margin-bottom: 12px; }
        .time { color: var(--s); font-weight: bold; float: left; }
        .desc { font-size: 1rem; opacity: 0.85; line-height: 1.5; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--p); display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { background: none; border: none; color: #fff; font-size: 1.6rem; cursor: pointer; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.8); }
    </style>
</head>
<body>

<div class="radio-zone">
    <span class="radio-title">📻 רדיו קול פלטינום:</span>
    <audio controls style="height: 30px; filter: invert(100%);">
        <source src="https://stream.kol-chai.co.il/live" type="audio/mpeg">
    </audio>
</div>

<header>
    <div class="logo"><div id="main-dot" class="status-dot"></div> מבצר VIP 💎</div>
    <div style="display: flex; gap: 15px;">
        <button class="nav-btn" onclick="fetchNews()">🔄</button>
        <button class="nav-btn" onclick="document.body.classList.toggle('dark-mode')">🌙</button>
    </div>
</header>

<div class="debug-box" id="debug">המערכת מאתחלת פרוטוקול עקיפה...</div>

<div class="container" id="news-feed">
    <div class="card">🚀 פיצוי VIP בטעינה... בודק 5 נתיבי עקיפה חסינים.</div>
</div>

<nav>
    <button class="nav-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">🏠</button>
    <button class="nav-btn" onclick="alert('סטטיסטיקה: \nמצב: VIP \nערוצי עקיפה: 4 \nחסימות: 0')">📊</button>
    <button class="nav-btn" onclick="shareApp()">📤</button>
</nav>

<script>
    const RSS_URL = 'https://www.jdn.co.il/feed/';
    const KEYS = ['oydf7vxtf8y0ykfbt0bc6qy8scf7pk6f6qyf5c7j'];

    async function fetchNews() {
        const feed = document.getElementById('news-feed');
        const debug = document.getElementById('debug');
        const dot = document.getElementById('main-dot');
        dot.style.background = "orange";

        const strategies = [
            `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}&api_key=${KEYS[0]}`,
            `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(RSS_URL))}`,
            `https://corsproxy.io/?${encodeURIComponent(RSS_URL)}`
        ];

        for (let i = 0; i < strategies.length; i++) {
            debug.innerText = `⚙️ ניסיון עקיפה מס' ${i+1} מתוך ${strategies.length}...`;
            try {
                const res = await fetch(strategies[i]);
                let data = await res.json();
                if (data.contents) data = JSON.parse(data.contents);

                if (data.items || data.status === 'ok') {
                    render(data.items || data);
                    debug.innerText = `✅ פיצוי VIP הופעל! מחובר דרך ערוץ ${i+1}`;
                    dot.style.background = "#25d366";
                    return;
                }
            } catch (e) { console.log(`נתיב ${i+1} חסום`); }
        }
        dot.style.background = "red";
        debug.innerText = `❌ חסימת רשת קשוחה. נסה ללחוץ שוב על רענון (🔄).`;
    }

    function render(items) {
        const feed = document.getElementById('news-feed');
        feed.innerHTML = '';
        items.forEach(item => {
            const date = new Date(item.pubDate);
            const time = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="time">${time}</span>
                <a href="${item.link}" target="_blank" class="title">${item.title}</a>
                <div class="desc">${item.description.replace(/<[^>]*>?/gm, '').substring(0,120)}...</div>
            `;
            feed.appendChild(card);
        });
    }

    function shareApp() { navigator.share({title: 'מבזקי VIP', url: location.href}); }
    
    fetchNews();
</script>
</body>
</html>
