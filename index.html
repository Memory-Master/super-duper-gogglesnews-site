<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מבצר פלטינום - הקפסולה 🛸</title>
    <style>
        :root { --neon: #00ffcc; --bg: #050a0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* רקע כוכבים זז */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #1b2735 0%, #090a0f 100%); overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: move 10s infinite linear; }
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(100vh); } }

        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon); background: rgba(0,0,0,0.8); }
        .glitch { font-size: 2rem; font-weight: bold; text-transform: uppercase; position: relative; color: var(--neon); text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.025em -0.05em 0 rgba(0,255,0,0.75), 0.025em 0.05em 0 rgba(0,0,255,0.75); animation: glitch 500ms infinite; }
        @keyframes glitch { 0% { text-shadow: 0.05em 0 0 #f00; } 50% { text-shadow: -0.05em -0.025em 0 #0f0; } 100% { text-shadow: 0.025em 0.05em 0 #00f; } }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .box { background: rgba(255,255,255,0.05); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; backdrop-filter: blur(5px); }
        
        /* משחק זיכרון מהיר */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .cell { width: 50px; height: 50px; background: #1a1a1a; border: 1px solid var(--neon); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        /* צ'אט בוט דמה */
        #chat-log { height: 150px; overflow-y: auto; font-size: 0.9rem; margin-bottom: 10px; border-bottom: 1px solid #333; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 5px; width: 80%; }

        .footer { text-align: center; padding: 10px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
    <div class="glitch">PLATINUM CAPSULE 💎</div>
    <div style="font-size: 0.8rem;">פיצוי מוחלט - מערכת מומצאת v1.0</div>
</header>

<div class="main-grid">
    <div class="box">
        <h3>🤖 צ'אט פלטינום (Offline)</h3>
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="דבר איתי..." onkeypress="if(event.key=='Enter') talk()">
    </div>

    <div class="box">
        <h3>🎮 מיני משחק: הקישור</h3>
        <p style="font-size: 0.7rem;">מצא את היהלומים 💎</p>
        <div class="game-grid" id="game"></div>
        <button onclick="initGame()" style="margin-top:10px; background:var(--neon); border:none; padding:5px 10px; cursor:pointer;">אתחל משחק</button>
    </div>

    <div class="box" style="grid-column: span 2;">
        <h3>🔮 מחולל מצבי רוח</h3>
        <button onclick="changeVibe('party')" style="background:#f0f; color:white; padding:10px;">מסיבה</button>
        <button onclick="changeVibe('matrix')" style="background:#0f0; color:black; padding:10px;">מטריקס</button>
        <button onclick="changeVibe('reset')" style="background:#fff; color:black; padding:10px;">איפוס</button>
        <p id="vibe-text" style="margin-top:10px;">בחר מצב רוח למערכת...</p>
    </div>
</div>

<div class="footer">כל הזכויות שמורות למערכת פלטינום - הפיצוי הכי גדול שקיים</div>

<script>
    // יצירת כוכבים
    for (let i = 0; i < 50; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        s.style.width = Math.random() * 3 + 'px';
        s.style.height = s.style.width;
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.animationDuration = (Math.random() * 5 + 5) + 's';
        document.getElementById('stars').appendChild(s);
    }

    // צ'אט בוט
    function talk() {
        const inp = document.getElementById('chat-input');
        const log = document.getElementById('chat-log');
        if (!inp.value) return;
        log.innerHTML += `<div><b>אתה:</b> ${inp.value}</div>`;
        
        let ans = "מעניין מאוד...";
        if (inp.value.includes("מי אתה")) ans = "אני הפיצוי שלך, בינה מלאכותית שלא צריכה אינטרנט!";
        if (inp.value.includes("שלום")) ans = "אהלן פלטינום! מה המצב?";
        if (inp.value.includes("מספרים")) ans = "הגענו לסוף כל המספרים, כפי שהבטחתי.";
        
        setTimeout(() => {
            log.innerHTML += `<div style="color:var(--neon)"><b>AI:</b> ${ans}</div>`;
            log.scrollTop = log.scrollHeight;
        }, 500);
        inp.value = '';
    }

    // משחק
    function initGame() {
        const g = document.getElementById('game');
        g.innerHTML = '';
        const emoji = ['💎', '🚀', '🔥', '💎', '🚀', '🔥', '⭐', '⭐', '🍀'];
        emoji.sort(() => Math.random() - 0.5);
        emoji.forEach(e => {
            let c = document.createElement('div');
            c.className = 'cell';
            c.onclick = () => { c.innerText = e; if(e=='💎') alert('מצאת יהלום! פלטינום אמיתי!'); };
            g.appendChild(c);
        });
    }

    function changeVibe(v) {
        const b = document.body;
        const vt = document.getElementById('vibe-text');
        if (v === 'party') { b.style.filter = 'hue-rotate(90deg)'; vt.innerText = "מצב מסיבה הופעל! 🎉"; }
        if (v === 'matrix') { b.style.filter = 'grayscale(1) sepia(1) hue-rotate(90deg) brightness(1.2)'; vt.innerText = "נכנסת למטריקס... 🕶️"; }
        if (v === 'reset') { b.style.filter = 'none'; vt.innerText = "חזרנו למציאות."; }
    }

    initGame();
</script>

</body>
</html>
